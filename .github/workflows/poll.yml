name: poll

on:
  schedule:
    # Runs every 15 min. Script self-rate-limits via should_poll_now() based on date.
    # Public repo = unlimited free Actions minutes; no-op runs are cheap.
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Poll even if not due"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          # Use the workflow's GITHUB_TOKEN so we can push back.
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run poll
        env:
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          SEATGEEK_CLIENT_ID: ${{ secrets.SEATGEEK_CLIENT_ID }}
          SEATGEEK_CLIENT_SECRET: ${{ secrets.SEATGEEK_CLIENT_SECRET }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
        run: |
          python -m monitor.poll ${{ inputs.force && '--force' || '' }} -v

      - name: Commit data
        run: |
          if [[ -z "$(git status --porcelain data/)" ]]; then
            echo "no data changes; skipping commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "data: poll @ $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          # Retry-once on race with another concurrent run.
          git pull --rebase --autostash || true
          git push
